services:
  gcoordinator:
    platform: linux/amd64
    environment:
      DISPLAY: :99
      LIBGL_ALWAYS_SOFTWARE: "1"
      VNC_PASSWORD: ${MACOS_VNC_PASSWORD:-gcoord01}
      QT_XCB_GL_INTEGRATION: xcb_glx
      PYOPENGL_PLATFORM: glx
    command: ["/usr/local/bin/run-macos-container"]
    ports:
      - "127.0.0.1:${MACOS_VNC_PORT:-5900}:5900"
