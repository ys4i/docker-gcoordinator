services:
  gcoordinator:
    build:
      context: .
      args:
        GCOORDINATOR_REPO: ${GCOORDINATOR_REPO:-https://github.com/tomohiron907/G-coordinator.git}
    image: docker-gcoordinator:latest
    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      XDG_RUNTIME_DIR: /tmp/runtime-gcoordinator
      HOME: /tmp
    user: "${UID:-1000}:${GID:-1000}"
    command: >
      sh -lc 'mkdir -p "$$XDG_RUNTIME_DIR"
      && chmod 700 "$$XDG_RUNTIME_DIR"
      && exec python3 main.py'
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY_PATH:-/dev/null}:/tmp/.Xauthority:ro
      - ./workspace:/workspace
    stdin_open: true
    tty: true
